metadata:
  name: "hybrid-mpls-sdn-callcenter"
  description: "Chính sách SDN Edge cho Call Center BPO"
  openflow_version: "1.3"
  default_action: "deny"

host_groups:
  project_a:
    label: "Dự án A"
    vlan: 20
    site: "HQ"
    count: 20
    prefix: "h20"
    subnet: "172.16.20.0/24"
    first_host: 11
    switch: "access_hq_a"
  project_b:
    label: "Dự án B"
    vlan: 30
    site: "HQ"
    count: 20
    prefix: "h30"
    subnet: "172.16.30.0/24"
    first_host: 11
    switch: "access_hq_b"
  project_c:
    label: "Dự án C"
    vlan: 40
    site: "HQ"
    count: 20
    prefix: "h40"
    subnet: "172.16.40.0/24"
    first_host: 11
    switch: "access_hq_c"
  telesale:
    label: "Telesale"
    vlan: 50
    site: "Branch"
    count: 20
    prefix: "h50"
    subnet: "172.16.50.0/24"
    first_host: 11
    switch: "access_branch"
  backoffice:
    label: "BackOffice"
    vlan: 60
    site: "Branch"
    count: 20
    prefix: "h60"
    subnet: "172.16.60.0/24"
    first_host: 11
    switch: "access_branch"

services:
  h90:
    label: "Voice Service"
    ip: "172.16.90.10"
    subnet: "172.16.90.0/24"
    gateway: "172.16.90.1"
    switch: "voice_mgmt"
  hzalo:
    label: "Zalo Service"
    ip: "172.16.200.10"
    transit_ip: "10.255.30.10"
  hcall:
    label: "Call App / CRM"
    ip: "172.16.201.10"
    transit_ip: "10.255.30.11"
  hsocial:
    label: "Mạng xã hội"
    ip: "172.16.202.10"
    transit_ip: "10.255.30.12"
  hinternet:
    label: "Internet chung"
    ip: "172.16.203.10"
    transit_ip: "10.255.30.13"

policies:
  isolate_hq_projects: true
  isolate_branch_vlan_50_60: true
  allow_voice: true
  allow_zalo: true
  allow_call_app: true
  allow_general_internet: true
  block_social_media: true
  voice_priority: true
  steer_hq_internet_to: "fw_hq"
  steer_branch_internet_to: "fw_branch"
  intersite_via_mpls_l3vpn: true
  intersite_allow:
    - source_group: "telesale"
      destination_group: "project_a"

runtime:
  controller: "127.0.0.1:6653"
  installed_flows_file: "runtime/installed_flows.json"
  events_file: "runtime/events.jsonl"
