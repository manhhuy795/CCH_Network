metadata:
  name: "sdn-edge-policy-callcenter-bpo"
  description: "Luat SDN Edge Policy cho Call Center BPO; topology lay tu vars/network_model.yml."
  default_action: "deny"

policies:
  isolate_hq_projects: true
  isolate_branch_vlan_50_60: true
  allow_voice: true
  allow_zalo: true
  allow_call_app: true
  allow_general_internet: true
  block_social_media: true
  allow_it_support_controlled_access: true
  voice_flow_priority: true
  steer_hq_internet_to: "fw_hq"
  steer_branch_internet_to: "fw_branch"
  intersite_via_mpls_l3vpn: true
  intersite_allow: []
  softphone_model:
    note: "Cfono/Gphone/softphone la ung dung tren may agent; user VLAN chi duoc di toi Voice Service, Call App va dich vu duoc phep."
    signaling_examples: ["SIP UDP/TCP 5060", "SIP TLS 5061"]
    media_examples: ["RTP/RTCP UDP range theo PBX/SBC thuc te"]
    production_warning: "Lab nay mo phong SDN policy, khong thay the kiem thu SIP registration, call setup, one-way audio, NAT/SBC va QoS that."

runtime:
  controller: "127.0.0.1:6653"
  installed_flows_file: "runtime/installed_flows.json"
  events_file: "runtime/events.jsonl"
