firewall_policy:
  runtime_defaults:
    engine: nftables
    family: inet
    forward_policy: drop
    allow_established_related: true
    drop_invalid: true
    counter_enabled: true
    drop_log_prefix: "CCH_FW_DROP"
    drop_log_rate: "10/second"

  shared_objects:
    applications:
      zalo:
        type: placeholder
        fqdn:
          - "*.zalo.me"
          - "*.zaloapp.com"
        app_id: "ZALO_APP_ID_TBD"
        notes: "Update with vendor-supported App-ID/FQDN object before production."
      call_app:
        type: placeholder
        fqdn:
          - "call-app.example.com"
        ip:
          - 203.0.113.200/32
        ports:
          - tcp/443
          - udp/10000-20000
        notes: "Replace with actual customer calling application FQDN/IP/ports."
      social_media:
        type: category
        categories:
          - social-networking
          - streaming-media
          - gaming

  sites:
    hq:
      firewall_name: fw_hq
      site: hq
      inside_node: core_hq
      outside_node: internet_zone
      inside_interface: inside
      outside_interface: outside
      owned_subnets:
        - 172.16.20.0/24
        - 172.16.30.0/24
        - 172.16.40.0/24
        - 172.16.70.0/24
      nat_source_vlans: [20, 30, 40, 70]
      policies:
        - name: allow-zalo
          action: allow
          sources: [20, 30, 40, 70]
          destinations: [internet]
          applications: [zalo]
          log: true
        - name: allow-call-app
          action: allow
          sources: [20, 30, 40, 70]
          destinations: [internet]
          applications: [call_app]
          log: true
        - name: deny-social-media
          action: deny
          sources: [20, 30, 40, 70]
          destinations: [internet]
          applications: [social_media]
          log: true

    branch_telesale:
      firewall_name: fw_telesale
      site: branch_telesale
      inside_node: dist_telesale
      outside_node: internet_zone
      inside_interface: inside
      outside_interface: outside
      owned_subnets:
        - 172.16.50.0/24
      nat_source_vlans: [50]
      policies:
        - name: allow-zalo
          action: allow
          sources: [50]
          destinations: [internet]
          applications: [zalo]
          log: true
        - name: allow-call-app
          action: allow
          sources: [50]
          destinations: [internet]
          applications: [call_app]
          log: true
        - name: deny-social-media
          action: deny
          sources: [50]
          destinations: [internet]
          applications: [social_media]
          log: true

    branch_backoffice:
      firewall_name: fw_backoffice
      site: branch_backoffice
      inside_node: dist_backoffice
      outside_node: internet_zone
      inside_interface: inside
      outside_interface: outside
      owned_subnets:
        - 172.16.60.0/24
      nat_source_vlans: [60]
      policies:
        - name: allow-zalo
          action: allow
          sources: [60]
          destinations: [internet]
          applications: [zalo]
          log: true
        - name: allow-call-app
          action: allow
          sources: [60]
          destinations: [internet]
          applications: [call_app]
          log: true
        - name: deny-social-media
          action: deny
          sources: [60]
          destinations: [internet]
          applications: [social_media]
          log: true
