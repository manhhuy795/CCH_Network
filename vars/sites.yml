sites:
  hq:
    name: "Site Chinh - Tru so"
    description: "HQ call center campus"
    devices:
      - name: hq-access-a
        role: access_switch
        site: hq
        platform: cisco_ios
        template: cisco_ios/access_switch.j2
        management_ip: 192.0.2.11
        access_vlans: [20]
      - name: hq-access-b
        role: access_switch
        site: hq
        platform: cisco_ios
        template: cisco_ios/access_switch.j2
        management_ip: 192.0.2.12
        access_vlans: [30]
      - name: hq-access-c
        role: access_switch
        site: hq
        platform: cisco_ios
        template: cisco_ios/access_switch.j2
        management_ip: 192.0.2.13
        access_vlans: [40]
      - name: hq-voice-mgmt
        role: voice_mgmt_switch
        site: hq
        platform: cisco_ios
        template: cisco_ios/voice_mgmt_switch.j2
        management_ip: 192.0.2.14
        access_vlans: [10, 90]
      - name: hq-core-l3
        role: core_hq
        site: hq
        platform: cisco_ios
        template: cisco_ios/core_hq.j2
        management_ip: 192.0.2.10
        svi_vlans: [10, 20, 30, 40, 90]
      - name: hq-ce-router
        role: ce_router
        site: hq
        platform: cisco_ios
        template: cisco_ios/ce_router.j2
        management_ip: 192.0.2.15
      - name: hq-firewall
        role: firewall
        site: hq
        platform: vendor_neutral
        template: firewall/firewall_policy_vendor_neutral.j2
        management_ip: 192.0.2.16
  branch:
    name: "Site Chi nhanh - Telesale"
    description: "Branch telesale office"
    devices:
      - name: br-access
        role: access_switch
        site: branch
        platform: cisco_ios
        template: cisco_ios/access_switch.j2
        management_ip: 192.0.2.50
        access_vlans: [50, 60]
      - name: br-dist-l3
        role: distribution_branch
        site: branch
        platform: cisco_ios
        template: cisco_ios/distribution_branch.j2
        management_ip: 192.0.2.51
        svi_vlans: [50, 60]
      - name: br-ce-router
        role: ce_router
        site: branch
        platform: cisco_ios
        template: cisco_ios/ce_router.j2
        management_ip: 192.0.2.52
      - name: br-firewall
        role: firewall
        site: branch
        platform: vendor_neutral
        template: firewall/firewall_policy_vendor_neutral.j2
        management_ip: 192.0.2.53
deployment_order:
  - access_switch
  - voice_mgmt_switch
  - core_hq
  - distribution_branch
  - ce_router
  - firewall
