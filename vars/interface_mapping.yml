interfaces:
  hq-access-floor1:
    access_ports:
      - {range: GigabitEthernet1/0/1-24, description: "Project A", vlan: 20}
      - {range: GigabitEthernet1/0/25-36, description: "Project B Floor 1", vlan: 30}
      - {range: GigabitEthernet1/0/37-42, description: "IoT HQ and UPS", vlan: 110}
      - {range: GigabitEthernet1/0/43-48, description: "Guest HQ", vlan: 120}
    uplink: {name: GigabitEthernet1/0/49, description: "TRUNK to hq-dist-1", allowed_vlans: [20, 30, 110, 120]}
  hq-access-floor2:
    access_ports:
      - {range: GigabitEthernet1/0/1-12, description: "Project B Floor 2", vlan: 30}
      - {range: GigabitEthernet1/0/13-28, description: "Project C", vlan: 40}
      - {range: GigabitEthernet1/0/29-44, description: "BackOffice", vlan: 60}
      - {range: GigabitEthernet1/0/45-48, description: "IT Support", vlan: 70}
    uplink: {name: GigabitEthernet1/0/49, description: "TRUNK to hq-dist-2", allowed_vlans: [30, 40, 60, 70]}
  hq-dist-1:
    trunks: [{name: GigabitEthernet1/0/1, description: "Floor 1 access", allowed_vlans: [20, 30, 110, 120]}, {name: GigabitEthernet1/0/2, description: "To Core", allowed_vlans: [20, 30, 90, 100, 110, 120]}]
  hq-dist-2:
    trunks: [{name: GigabitEthernet1/0/1, description: "Floor 2 access", allowed_vlans: [30, 40, 60, 70]}, {name: GigabitEthernet1/0/2, description: "To Core", allowed_vlans: [30, 40, 60, 70]}]
  hq-infra-access:
    access_ports:
      - {range: GigabitEthernet1/0/1, description: "PBX/SBC Voice", vlan: 90}
      - {range: GigabitEthernet1/0/2-48, description: "Infrastructure services", vlan: 100}
    uplink: {name: GigabitEthernet1/0/49, description: "TRUNK to hq-dist-1", allowed_vlans: [90, 100]}
  br-access:
    access_ports:
      - {range: GigabitEthernet1/0/1-30, description: "Telesale", vlan: 50}
      - {range: GigabitEthernet1/0/31-36, description: "IoT Branch and UPS", vlan: 111}
    uplink: {name: GigabitEthernet1/0/49, description: "TRUNK to br-dist-l3", allowed_vlans: [50, 111]}
  hq-core-l3:
    trunks: [{name: GigabitEthernet1/0/1, description: "To HQ distribution", allowed_vlans: [20, 30, 40, 60, 70, 90, 100, 110, 111, 120]}]
    routed: [{name: GigabitEthernet1/0/47, description: "L3 link to HQ CE", ip: 10.10.255.1/30}, {name: GigabitEthernet1/0/48, description: "L3 link to HQ firewall", ip: 10.10.254.1/30}]
  hq-ce-router:
    routed:
      - {name: GigabitEthernet0/0, description: "L3 link to HQ Core", ip: 10.10.255.2/30}
      - {name: GigabitEthernet0/1, description: "MPLS Primary CE handoff", ip: 10.255.0.1/30}
      - {name: GigabitEthernet0/2, description: "MPLS Backup CE handoff", ip: 10.255.0.9/30}
  hq-firewall:
    routed:
      - {name: eth0, description: "Inside to HQ Core", ip: 10.10.254.2/30}
      - {name: eth1, description: "Outside to Internet Edge", ip: 10.255.10.1/30}
  br-dist-l3:
    trunks: [{name: GigabitEthernet1/0/1, description: "To Branch access", allowed_vlans: [50, 111]}]
    routed: [{name: GigabitEthernet1/0/47, description: "L3 link to Branch CE", ip: 10.20.255.1/30}, {name: GigabitEthernet1/0/48, description: "L3 link to Branch firewall", ip: 10.20.254.1/30}]
  br-ce-router:
    routed:
      - {name: GigabitEthernet0/0, description: "L3 link to Branch Distribution", ip: 10.20.255.2/30}
      - {name: GigabitEthernet0/1, description: "MPLS Primary CE handoff", ip: 10.255.0.6/30}
      - {name: GigabitEthernet0/2, description: "MPLS Backup CE handoff", ip: 10.255.0.14/30}
  br-firewall:
    routed:
      - {name: eth0, description: "Inside to Branch Distribution", ip: 10.20.254.2/30}
      - {name: eth1, description: "Outside to Internet Edge", ip: 10.255.10.5/30}
