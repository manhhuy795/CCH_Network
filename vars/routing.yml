    internal_routes:
      - {prefix: 172.16.0.0/24, next_hop: 10.10.255.1}
      - {prefix: 172.16.20.0/24, next_hop: 10.10.255.1}
      - {prefix: 172.16.30.0/24, next_hop: 10.10.255.1}
      - {prefix: 172.16.40.0/24, next_hop: 10.10.255.1}
      - {prefix: 172.16.60.0/24, next_hop: 10.10.255.1}
      - {prefix: 172.16.70.0/24, next_hop: 10.10.255.1}
      - {prefix: 172.16.90.0/24, next_hop: 10.10.255.1}
    mpls_routes:
      - {prefix: 172.16.50.0/24, next_hop: 10.255.0.2}
  ce_telesale:
    provider_next_hop: 10.255.0.6
    internal_routes:
      - {prefix: 172.16.50.0/24, next_hop: 10.20.255.1}
    mpls_routes:
      - {prefix: 172.16.0.0/24, next_hop: 10.255.0.6}
      - {prefix: 172.16.20.0/24, next_hop: 10.255.0.6}
      - {prefix: 172.16.30.0/24, next_hop: 10.255.0.6}
      - {prefix: 172.16.40.0/24, next_hop: 10.255.0.6}
      - {prefix: 172.16.60.0/24, next_hop: 10.255.0.6}
      - {prefix: 172.16.70.0/24, next_hop: 10.255.0.6}
      - {prefix: 172.16.90.0/24, next_hop: 10.255.0.6}
  mpls_cloud:
    internal_routes:
      - {prefix: 172.16.0.0/24, next_hop: 10.255.0.1}
      - {prefix: 172.16.20.0/24, next_hop: 10.255.0.1}
      - {prefix: 172.16.30.0/24, next_hop: 10.255.0.1}
      - {prefix: 172.16.40.0/24, next_hop: 10.255.0.1}
      - {prefix: 172.16.60.0/24, next_hop: 10.255.0.1}
      - {prefix: 172.16.70.0/24, next_hop: 10.255.0.1}
      - {prefix: 172.16.90.0/24, next_hop: 10.255.0.1}
      - {prefix: 172.16.50.0/24, next_hop: 10.255.0.5}
  fw_hq:
    default_route: {next_hop: 10.255.10.2, description: "Internet Zone"}
    internal_routes:
      - {prefix: 172.16.20.0/24, next_hop: 10.10.254.1}
      - {prefix: 172.16.30.0/24, next_hop: 10.10.254.1}
      - {prefix: 172.16.40.0/24, next_hop: 10.10.254.1}
      - {prefix: 172.16.60.0/24, next_hop: 10.10.254.1}
