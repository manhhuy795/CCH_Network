metadata:
  name: "Hybrid MPLS L3VPN Logic Simulation + SDN Edge Policy for Call Center BPO"
  description: "Mo hinh doanh nghiep ba lop: Core, Distribution, Access; HQ hai tang va chi nhanh Telesale."
  architecture: "Core Layer / Distribution Layer / Access Layer"
  openflow_version: "1.3"
  controller: "127.0.0.1:6653"
  migration_note: "BackOffice da o HQ Floor 2. Cac ten access_hq_a/access_hq_b/access_hq_c/access_hq_it/voice_access/access_backoffice/access_iot/access_guest/branch_backoffice/dist_backoffice/ce_backoffice/fw_backoffice la ten legacy, khong phai active topology."
  limitations: "core_hq la node runtime dai dien cho Core HQ Logical HA Pair; dist_hq_1 va dist_hq_2 la hai distribution runtime, khong fake HSRP/VRRP/MLAG. MPLS chi la logic transport simulation."

sites:
  hq:
    label: "HQ - Tru so chinh"
    kind: physical
    floors: [floor1, floor2]
  branch_telesale:
    label: "Branch Telesale"
    kind: physical
  wan:
    label: "WAN / MPLS L3VPN Logic"
    kind: logical
  internet:
    label: "Internet / Service Zone"
    kind: logical

host_groups:
  project_a:
    label: "Project A - HQ Floor 1"
    vlan: 20
    site: hq
    floor: floor1
    count: 20
    prefix: h20
    subnet: 172.16.20.0/24
    gateway: 172.16.20.1
    gateway_node: core_hq
    first_host: 11
    switch: access_floor1
  project_b:
    label: "Project B - HQ Floor 1 + Floor 2"
    vlan: 30
    site: hq
    count: 20
    prefix: h30
    subnet: 172.16.30.0/24
    gateway: 172.16.30.1
    gateway_node: core_hq
    first_host: 11
    switch: access_floor1
    placements:
      - {floor: floor1, switch: access_floor1, count: 10}
      - {floor: floor2, switch: access_floor2, count: 10}
  project_c:
    label: "Project C - HQ Floor 2"
    vlan: 40
    site: hq
    floor: floor2
    count: 20
    prefix: h40
    subnet: 172.16.40.0/24
    gateway: 172.16.40.1
    gateway_node: core_hq
    first_host: 11
    switch: access_floor2
  telesale:
    label: "Telesale - Branch"
    vlan: 50
    site: branch_telesale
    count: 20
    prefix: h50
    subnet: 172.16.50.0/24
    gateway: 172.16.50.1
    gateway_node: dist_branch
    first_host: 11
    switch: access_branch
  backoffice:
    label: "BackOffice - HQ Floor 2"
    vlan: 60
    site: hq
    floor: floor2
    count: 20
    prefix: h60
    subnet: 172.16.60.0/24
    gateway: 172.16.60.1
    gateway_node: core_hq
    first_host: 11
    switch: access_floor2
  it_support:
    label: "IT Support - HQ Floor 2"
    vlan: 70
    site: hq
    floor: floor2
    count: 10
    prefix: h70
    subnet: 172.16.70.0/24
    gateway: 172.16.70.1
    gateway_node: core_hq
    first_host: 11
    switch: access_floor2
  iot_hq:
    label: "IoT HQ + UPS - Floor 1"
    vlan: 110
    site: hq
    floor: floor1
    count: 5
    prefix: iot
    host_kind: iot
    subnet: 172.16.110.0/24
    gateway: 172.16.110.1
    gateway_node: core_hq
    switch: access_floor1
    addressing: reservation
    endpoints:
      - {name: iot_cam_01, label: "Camera Floor 1", role: camera, ip: 172.16.110.101}
      - {name: iot_cam_02, label: "Camera Entrance", role: camera, ip: 172.16.110.102}
      - {name: ups_floor1, label: "UPS Floor 1", role: ups, ip: 172.16.110.103}
      - {name: ups_core_1, label: "UPS Core 1", role: ups, ip: 172.16.110.104}
      - {name: ups_core_2, label: "UPS Core 2", role: ups, ip: 172.16.110.105}
  iot_branch:
    label: "IoT Branch + UPS - Telesale"
    vlan: 111
    site: branch_telesale
    count: 2
    prefix: iotb
    host_kind: iot
    subnet: 172.16.111.0/24
    gateway: 172.16.111.1
    gateway_node: dist_branch
    switch: access_branch
    addressing: reservation
    endpoints:
      - {name: iot_branch_cam_01, label: "Camera Branch", role: camera, ip: 172.16.111.101}
      - {name: ups_branch_1, label: "UPS Branch 1", role: ups, ip: 172.16.111.102}
  guest:
    label: "Guest HQ - Floor 1"
    vlan: 120
    site: hq
    floor: floor1
    count: 2
    prefix: guest
    host_kind: guest
    subnet: 172.16.120.0/24
    gateway: 172.16.120.1
    gateway_node: core_hq
    switch: access_floor1
    addressing: dhcp
    endpoints:
      - {name: guest_01, label: "Guest Client 01", ip: 172.16.120.101}
      - {name: guest_02, label: "Guest Client 02", ip: 172.16.120.102}

service_addressing:
  model: interface_plus_service_vip
  interface_subnet: 10.255.30.0/24
  gateway_node: internet_zone
  gateway_ip: 10.255.30.1
  vip_prefix_length: 32
  route_owner: internet_zone

services:
  h90:
    label: "PBX / SBC Voice Service"
    ip: 172.16.90.10
    subnet: 172.16.90.0/24
    gateway: 172.16.90.1
    gateway_node: core_hq
    vlan: 90
    site: hq
    switch: infra_access
  hzalo:
    label: "Zalo Service Simulator"
    ip: 172.16.200.10
    subnet: 172.16.200.10/32
    interface_ip: 10.255.30.10
    interface_cidr: 10.255.30.10/24
    transit_ip: 10.255.30.10
    gateway: 10.255.30.1
    site: internet
  hcall:
    label: "Call App Service Simulator"
    ip: 172.16.201.10
    subnet: 172.16.201.10/32
    interface_ip: 10.255.30.11
    interface_cidr: 10.255.30.11/24
    transit_ip: 10.255.30.11
    gateway: 10.255.30.1
    site: internet
  hsocial:
    label: "Social Media Service Simulator"
    ip: 172.16.202.10
    subnet: 172.16.202.10/32
    interface_ip: 10.255.30.12
    interface_cidr: 10.255.30.12/24
    transit_ip: 10.255.30.12
    gateway: 10.255.30.1
    site: internet
  hinternet:
    label: "General Internet Test Service"
    ip: 172.16.203.10
    subnet: 172.16.203.10/32
    interface_ip: 10.255.30.13
    interface_cidr: 10.255.30.13/24
    transit_ip: 10.255.30.13
    gateway: 10.255.30.1
    site: internet

infrastructure_services:
  hdhcp: {label: "DHCP Server", ip: 172.16.100.10, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: dhcp}
  hdns: {label: "DNS Server", ip: 172.16.100.11, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: dns}
  hntp: {label: "NTP Server", ip: 172.16.100.12, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: ntp}
  hmonitor: {label: "Monitoring / Syslog", ip: 172.16.100.13, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: monitoring}
  hnvr: {label: "NVR / VMS", ip: 172.16.100.14, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: nvr}
  hrecording: {label: "Call Recording", ip: 172.16.100.15, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: recording}
  hdialer: {label: "Dialer / CRM", ip: 172.16.100.16, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: crm}
  hbackup: {label: "Backup Server", ip: 172.16.100.17, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: backup}
  had: {label: "Auth / AD", ip: 172.16.100.18, subnet: 172.16.100.0/24, gateway: 172.16.100.1, site: hq, vlan: 100, switch: infra_access, role: auth}

switches:
  access_floor1: {label: "Access HQ Floor 1", role: access, site: hq, floor: floor1, controlled: true, dpid: "0000000000000001"}
  access_floor2: {label: "Access HQ Floor 2", role: access, site: hq, floor: floor2, controlled: true, dpid: "0000000000000002"}
  dist_hq_1: {label: "Distribution HQ 1", role: hq_distribution, site: hq, controlled: true, dpid: "0000000000000003"}
  dist_hq_2: {label: "Distribution HQ 2", role: hq_distribution, site: hq, controlled: true, dpid: "0000000000000004"}
  core_hq: {label: "Core HQ - Logical HA Pair", role: hq_core, site: hq, controlled: true, dpid: "0000000000000005"}
  access_branch: {label: "Access Branch Telesale + IoT", role: access, site: branch_telesale, controlled: true, dpid: "0000000000000006"}
  dist_branch: {label: "Distribution Branch Telesale", role: branch_distribution, site: branch_telesale, controlled: true, dpid: "0000000000000007"}
  infra_access: {label: "Infrastructure Access", role: infrastructure_access, site: hq, controlled: true, dpid: "0000000000000008"}

infrastructure:
  c0: {label: "SDN Controller", type: controller, site: hq}
  ce_hq: {label: "CE Router HQ", type: router, site: hq}
  ce_telesale: {label: "CE Router Branch Telesale", type: router, site: branch_telesale}
  mpls_primary: {label: "MPLS Primary", subtitle: "WAN transport - metric 10", type: wan, site: wan, metric: 10}
  mpls_backup: {label: "MPLS Backup", subtitle: "WAN transport - metric 100", type: wan, site: wan, metric: 100}
  fw_hq: {label: "Firewall HQ Internet Edge", subtitle: "Local breakout HQ", type: firewall, site: hq}
  fw_telesale: {label: "Firewall Branch Internet Edge", subtitle: "Local breakout Branch", type: firewall, site: branch_telesale}
  internet_zone: {label: "Internet / Service Zone", type: service_edge, site: internet}

