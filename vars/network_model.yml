  telesale_voice_primary: [telesale, access_branch, dist_branch, ce_telesale, mpls_primary, ce_hq, core_hq, infra_access, h90]
  telesale_voice_backup: [telesale, access_branch, dist_branch, ce_telesale, mpls_backup, ce_hq, core_hq, infra_access, h90]
