metadata:
  name: "Hybrid MPLS L3VPN Logic Simulation + SDN Edge Policy for Call Center BPO"
  description: "Source of truth cho hai site vat ly HQ va Telesale, IP plan, host inventory va dashboard."
  openflow_version: "1.3"
  controller: "127.0.0.1:6653"
  migration_note: "access_branch, dist_branch, ce_branch, fw_branch va cac node branch_backoffice, dist_backoffice, ce_backoffice, fw_backoffice chi duoc phep xuat hien trong migration guard; chung khong phai active topology node hay routing endpoint cua Phase 41. VLAN 10 duoc giu cho Management; enterprise extension dung VLAN 110 cho IoT/UPS de tranh xung dot source-of-truth."

