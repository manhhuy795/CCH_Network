all:
  children:
    hq:
      hosts:
        hq-core-l3:
          ansible_host: 192.0.2.10
          ansible_network_os: cisco.ios.ios
          device_role: core_hq
        hq-access-a:
          ansible_host: 192.0.2.11
          ansible_network_os: cisco.ios.ios
          device_role: access_switch
        hq-access-b:
          ansible_host: 192.0.2.12
          ansible_network_os: cisco.ios.ios
          device_role: access_switch
        hq-access-c:
          ansible_host: 192.0.2.13
          ansible_network_os: cisco.ios.ios
          device_role: access_switch
        hq-voice-mgmt:
          ansible_host: 192.0.2.14
          ansible_network_os: cisco.ios.ios
          device_role: voice_mgmt_switch
        hq-ce-router:
          ansible_host: 192.0.2.15
          ansible_network_os: cisco.ios.ios
          device_role: ce_router
        hq-firewall:
          ansible_host: 192.0.2.16
          device_role: firewall
    branch:
      hosts:
        br-access:
          ansible_host: 192.0.2.50
          ansible_network_os: cisco.ios.ios
          device_role: access_switch
        br-dist-l3:
          ansible_host: 192.0.2.51
          ansible_network_os: cisco.ios.ios
          device_role: distribution_branch
        br-ce-router:
          ansible_host: 192.0.2.52
          ansible_network_os: cisco.ios.ios
          device_role: ce_router
        br-firewall:
          ansible_host: 192.0.2.53
          device_role: firewall
  vars:
    ansible_connection: network_cli
    ansible_user: "{{ lookup('env', 'NET_USERNAME') }}"
    ansible_password: "{{ lookup('env', 'NET_PASSWORD') }}"
    ansible_become: true
    ansible_become_method: enable
    ansible_become_password: "{{ lookup('env', 'NET_SECRET') }}"
