    <line x1="320" y1="0" x2="354" y2="0" class="link control"/><text x="364" y="4">OpenFlow control</text>
    <rect x="535" y="-10" width="20" height="20" fill="#fff7ed" stroke="#d97706" stroke-width="2" rx="4"/><text x="565" y="4">IT / Firewall edge</text>
