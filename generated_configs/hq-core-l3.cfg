! Generated candidate config for hq-core-l3
! Review vendor syntax in lab before production deploy.
hostname hq-core-l3
ip routing
!
vlan 10
 name MGMT
!
vlan 20
 name PROJECT_A
!
vlan 30
 name PROJECT_B
!
vlan 40
 name PROJECT_C
!
vlan 70
 name IT_SUPPORT
!
vlan 90
 name VOICE
!
interface Vlan10
 description SVI MGMT - Management/NMS VLAN
 ip address 172.16.0.1 255.255.255.0
 ip access-group ACL_MGMT_IN in
 no shutdown
!
interface Vlan20
 description SVI PROJECT_A - Project A users
 ip address 172.16.20.1 255.255.255.0
 ip access-group ACL_VLAN20_IN in
 no shutdown
!
interface Vlan30
 description SVI PROJECT_B - Project B users
 ip address 172.16.30.1 255.255.255.0
 ip access-group ACL_VLAN30_IN in
 no shutdown
!
interface Vlan40
 description SVI PROJECT_C - Project C users
 ip address 172.16.40.1 255.255.255.0
 ip access-group ACL_VLAN40_IN in
 no shutdown
!
interface Vlan90
 description SVI VOICE - IP phone and softphone voice VLAN
 ip address 172.16.90.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet1/0/1
 description TRUNK to hq-access-a
 switchport mode trunk
 switchport trunk allowed vlan 10,20,90
 spanning-tree portfast trunk
!
interface GigabitEthernet1/0/2
 description TRUNK to hq-access-b
 switchport mode trunk
 switchport trunk allowed vlan 10,30,90
 spanning-tree portfast trunk
!
interface GigabitEthernet1/0/3
 description TRUNK to hq-access-c
 switchport mode trunk
 switchport trunk allowed vlan 10,40,90
 spanning-tree portfast trunk
!
interface GigabitEthernet1/0/4
 description TRUNK to hq-voice-access
 switchport mode trunk
 switchport trunk allowed vlan 10,90
 spanning-tree portfast trunk
!
interface GigabitEthernet1/0/47
 description L3 link to HQ CE router
 no switchport
 ip address 10.10.255.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet1/0/48
 description L3 link to HQ firewall inside
 no switchport
 ip address 10.10.254.1 255.255.255.252
 no shutdown
!
ip route 0.0.0.0 0.0.0.0 10.10.254.2 name DEFAULT_TO_HQ_FIREWALL
ip route 172.16.50.0 255.255.255.0 10.10.255.2 name MPLS_TO_CE
ip route 172.16.60.0 255.255.255.0 10.10.255.2 name MPLS_TO_CE
!
ip access-list extended ACL_VLAN20_IN
 remark Inbound policy for VLAN 20 - isolate BPO projects
 deny ip 172.16.20.0 0.0.0.255 172.16.30.0 0.0.0.255 log
 deny ip 172.16.20.0 0.0.0.255 172.16.40.0 0.0.0.255 log
 deny ip 172.16.20.0 0.0.0.255 172.16.0.0 0.0.0.255 log
 permit ip 172.16.20.0 0.0.0.255 172.16.90.0 0.0.0.255
 permit ip 172.16.20.0 0.0.0.255 any
!
ip access-list extended ACL_VLAN30_IN
 remark Inbound policy for VLAN 30 - isolate BPO projects
 deny ip 172.16.30.0 0.0.0.255 172.16.20.0 0.0.0.255 log
 deny ip 172.16.30.0 0.0.0.255 172.16.40.0 0.0.0.255 log
 deny ip 172.16.30.0 0.0.0.255 172.16.0.0 0.0.0.255 log
 permit ip 172.16.30.0 0.0.0.255 172.16.90.0 0.0.0.255
 permit ip 172.16.30.0 0.0.0.255 any
!
ip access-list extended ACL_VLAN40_IN
 remark Inbound policy for VLAN 40 - isolate BPO projects
 deny ip 172.16.40.0 0.0.0.255 172.16.20.0 0.0.0.255 log
 deny ip 172.16.40.0 0.0.0.255 172.16.30.0 0.0.0.255 log
 deny ip 172.16.40.0 0.0.0.255 172.16.0.0 0.0.0.255 log
 permit ip 172.16.40.0 0.0.0.255 172.16.90.0 0.0.0.255
 permit ip 172.16.40.0 0.0.0.255 any
!
ip access-list extended ACL_MGMT_IN
 remark Placeholder: permit only admin/jump hosts from management VLAN
 permit ip 172.16.0.10 0.0.0.0 any
 permit ip 172.16.0.11 0.0.0.0 any
 deny ip any any log
!
end
