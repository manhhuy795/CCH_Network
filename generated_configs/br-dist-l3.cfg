! Generated candidate config for br-dist-l3
hostname br-dist-l3
ip routing
!
vlan 50
 name TELESALE
!
interface Vlan50
 description SVI TELESALE - Branch telesale users
 ip address 172.16.50.1 255.255.255.0
 ip access-group ACL_VLAN50_IN in
 no shutdown
!
interface GigabitEthernet1/0/1
 description TRUNK to br-access
 switchport mode trunk
 switchport trunk allowed vlan 50
 spanning-tree portfast trunk
!
interface GigabitEthernet1/0/47
 description L3 link to Branch CE router
 no switchport
 ip address 10.20.255.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet1/0/48
 description L3 link to Branch firewall inside
 no switchport
 ip address 10.20.254.1 255.255.255.252
 no shutdown
!
ip route 0.0.0.0 0.0.0.0 10.20.254.2 name DEFAULT_TO_BRANCH_FIREWALL
ip route 172.16.0.0 255.255.255.0 10.20.255.2 name MPLS_TO_CE
ip route 172.16.20.0 255.255.255.0 10.20.255.2 name MPLS_TO_CE
ip route 172.16.30.0 255.255.255.0 10.20.255.2 name MPLS_TO_CE
ip route 172.16.40.0 255.255.255.0 10.20.255.2 name MPLS_TO_CE
ip route 172.16.60.0 255.255.255.0 10.20.255.2 name MPLS_TO_CE
ip route 172.16.70.0 255.255.255.0 10.20.255.2 name MPLS_TO_CE
ip route 172.16.90.0 255.255.255.0 10.20.255.2 name MPLS_TO_CE
!
ip access-list extended ACL_VLAN50_IN
 remark Inbound policy for VLAN 50 - no implicit full branch access
 deny ip 172.16.50.0 0.0.0.255 172.16.60.0 0.0.0.255 log
 remark TODO: add explicit permits for call_app, dns, ntp after service IPs are known
 permit udp 172.16.50.0 0.0.0.255 any eq domain
 permit udp 172.16.50.0 0.0.0.255 any eq ntp
 deny ip 172.16.50.0 0.0.0.255 172.16.0.0 0.0.255.255 log
 permit ip 172.16.50.0 0.0.0.255 any
!
ip access-list extended ACL_VLAN60_IN
 remark Inbound policy for VLAN 60 - no implicit full branch access
 deny ip 172.16.60.0 0.0.0.255 172.16.50.0 0.0.0.255 log
 remark TODO: add explicit permits for admin_backoffice, dns, ntp after service IPs are known
 permit udp 172.16.60.0 0.0.0.255 any eq domain
 permit udp 172.16.60.0 0.0.0.255 any eq ntp
 deny ip 172.16.60.0 0.0.0.255 172.16.0.0 0.0.255.255 log
 permit ip 172.16.60.0 0.0.0.255 any
!
end
