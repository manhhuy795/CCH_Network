! Generated candidate config for hq-voice-mgmt
! Warning: Management and Voice share this switch; README documents SPOF risk.
hostname hq-voice-mgmt
!
vlan 10
 name MGMT
!
vlan 90
 name VOICE
!
interface range GigabitEthernet1/0/1-12
 description Management device ports
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
!
interface range GigabitEthernet1/0/13-48
 description IP phone/softphone ports
 switchport mode access
 switchport access vlan 90
 spanning-tree portfast
!
interface GigabitEthernet1/0/49
 description TRUNK to hq-core-l3
 switchport mode trunk
 switchport trunk allowed vlan 10,90
!
end
