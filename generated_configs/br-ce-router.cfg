! Generated candidate config for br-ce-router
! MPLS L3VPN design: CE routes point to local ISP PE, never to remote CE router IPs.
hostname br-ce-router
!
interface GigabitEthernet0/0
 description L3 link to Branch Distribution
 ip address 10.20.255.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description MPLS Primary CE handoff
 ip address 10.255.0.6 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description MPLS Backup CE handoff
 ip address 10.255.0.14 255.255.255.252
 no shutdown
!
ip route 172.16.50.0 255.255.255.0 10.20.255.1 name INTERNAL_TO_LAN
ip route 172.16.111.0 255.255.255.0 10.20.255.1 name INTERNAL_TO_LAN
ip route 172.16.0.0 255.255.0.0 10.255.0.5 name MPLS_VIA_ISP_PE
!
end
