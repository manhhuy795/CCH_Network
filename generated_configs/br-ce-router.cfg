! Generated candidate config for br-ce-router
! MPLS L3VPN design: CE routes point to local ISP PE, never to remote CE router IPs.
hostname br-ce-router
!
interface GigabitEthernet0/0
 description LAN to br-dist-l3
 ip address 10.20.255.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description WAN to ISP MPLS PE - Branch
 ip address 198.51.100.2 255.255.255.252
 no shutdown
!
ip route 172.10.50.0 255.255.255.0 10.20.255.1 name INTERNAL_TO_LAN
ip route 172.10.60.0 255.255.255.0 10.20.255.1 name INTERNAL_TO_LAN
ip route 172.10.0.0 255.255.0.0 198.51.100.1 name MPLS_VIA_ISP_PE
!
end
