!
hostname hq-dist-1
!
no ip domain-lookup
ip routing
!
vlan 10
 name MGMT
!
vlan 20
 name PROJECT_A
!
vlan 30
 name PROJECT_B
!
vlan 40
 name PROJECT_C
!
vlan 60
 name BACKOFFICE
!
vlan 70
 name IT_SUPPORT
!
vlan 90
 name VOICE
!
vlan 100
 name INFRASTRUCTURE
!
vlan 110
 name IOT_HQ
!
vlan 120
 name GUEST_HQ
!
interface GigabitEthernet1/0/1
 description Floor 1 access
 switchport mode trunk
 switchport trunk allowed vlan 20,30,110,120
 no shutdown
!
interface GigabitEthernet1/0/2
 description To Core
 switchport mode trunk
 switchport trunk allowed vlan 20,30,90,100,110,120
 no shutdown
!
end
