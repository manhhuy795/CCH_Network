! Generated candidate config for hq-ce-router
! MPLS L3VPN design: CE routes point to local ISP PE, never to remote CE router IPs.
hostname hq-ce-router
!
interface GigabitEthernet0/0
 description L3 link to HQ Core
 ip address 10.10.255.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description MPLS Primary CE handoff
 ip address 10.255.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description MPLS Backup CE handoff
 ip address 10.255.0.9 255.255.255.252
 no shutdown
!
ip route 172.16.0.0 255.255.0.0 10.10.255.1 name INTERNAL_TO_LAN
ip route 172.16.50.0 255.255.255.0 10.255.0.2 name MPLS_VIA_ISP_PE
ip route 172.16.111.0 255.255.255.0 10.255.0.2 name MPLS_VIA_ISP_PE
!
end
