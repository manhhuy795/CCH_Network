! Generated candidate config for hq-ce-router
! MPLS L3VPN design: CE routes point to local ISP PE, never to remote CE router IPs.
hostname hq-ce-router
!
interface GigabitEthernet0/0
 description LAN to hq-core-l3
 ip address 10.10.255.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description WAN to ISP MPLS PE - HQ
 ip address 203.0.113.2 255.255.255.252
 no shutdown
!
ip route 172.10.0.0 255.255.255.0 10.10.255.1 name INTERNAL_TO_LAN
ip route 172.10.20.0 255.255.255.0 10.10.255.1 name INTERNAL_TO_LAN
ip route 172.10.30.0 255.255.255.0 10.10.255.1 name INTERNAL_TO_LAN
ip route 172.10.40.0 255.255.255.0 10.10.255.1 name INTERNAL_TO_LAN
ip route 172.10.90.0 255.255.255.0 10.10.255.1 name INTERNAL_TO_LAN
ip route 172.10.50.0 255.255.255.0 203.0.113.1 name MPLS_VIA_ISP_PE
ip route 172.10.60.0 255.255.255.0 203.0.113.1 name MPLS_VIA_ISP_PE
!
end
